<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Hub Performance Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; color: #1a1a2e; }

  .header {
    background: linear-gradient(135deg, #1565c0, #1976d2, #42a5f5);
    padding: 28px 40px; text-align: center;
    box-shadow: 0 2px 12px rgba(21,101,192,0.15);
  }
  .header h1 { font-size: 26px; color: #fff; letter-spacing: 1px; }
  .header p { color: #e3f2fd; margin-top: 5px; font-size: 13px; }
  .last-updated { color: #fff; font-size: 12px; margin-top: 5px; opacity: 0.85; }

  .filters {
    display: flex; gap: 14px; padding: 16px 40px;
    background: #fff; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid #e0e7ef;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .filters label { color: #555; font-size: 13px; font-weight: 600; }
  .filters select {
    background: #f0f4ff; color: #1a1a2e; border: 1px solid #90caf9;
    padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  .filters select:focus { outline: none; border-color: #1976d2; }
  .refresh-btn {
    margin-left: auto; background: #1976d2; color: #fff;
    border: none; padding: 9px 20px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .refresh-btn:hover { background: #1565c0; }

  .container { padding: 28px 40px; }

  .active-filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
  }
  .filter-chip {
    background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0;
    padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .filter-chip .remove { cursor: pointer; font-weight: 700; color: #e53935; }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .kpi-card {
    background: #fff; border: 1px solid #e0e7ef; border-radius: 12px;
    padding: 18px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(21,101,192,0.12); }
  .kpi-card .value { font-size: 30px; font-weight: 700; color: #1976d2; }
  .kpi-card .label { font-size: 11px; color: #888; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .sublabel { font-size: 10px; color: #43a047; margin-top: 3px; }

  .section-title {
    font-size: 15px; font-weight: 700; color: #1565c0;
    margin-bottom: 14px; padding-bottom: 7px;
    border-bottom: 2px solid #90caf9;
    display: flex; align-items: center; gap: 8px;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 28px; }
  @media(max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .card {
    background: #fff; border: 1px solid #e0e7ef;
    border-radius: 12px; padding: 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .funnel-row { display: flex; align-items: center; margin-bottom: 11px; gap: 10px; }
  .funnel-label { width: 120px; font-size: 13px; color: #555; }
  .funnel-bar-wrap { flex: 1; background: #f0f4ff; border-radius: 4px; height: 26px; overflow: hidden; }
  .funnel-bar {
    height: 100%; border-radius: 4px; display: flex; align-items: center;
    padding-left: 10px; font-size: 12px; font-weight: 600; color: #fff;
    transition: width 0.8s ease;
  }
  .funnel-value { width: 55px; text-align: right; font-weight: 700; color: #1976d2; font-size: 13px; }

  .clickable-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .click-pill {
    border-radius: 10px; padding: 16px; text-align: center;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .click-pill:hover { transform: scale(1.04); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .click-pill.active-pill { border-width: 2.5px !important; box-shadow: 0 0 0 3px rgba(21,101,192,0.2); transform: scale(1.04); }

  .click-pill.hot { background: #fff5f5; border-color: #ef5350; }
  .click-pill.warm { background: #fff8f0; border-color: #ffa726; }
  .click-pill.cold { background: #f0f7ff; border-color: #42a5f5; }
  .click-pill.nq { background: #fafafa; border-color: #bdbdbd; }
  .click-pill.virtual { background: #f3e5f5; border-color: #ab47bc; }
  .click-pill.inperson { background: #e8f5e9; border-color: #66bb6a; }

  .click-pill .num { font-size: 26px; font-weight: 700; }
  .click-pill.hot .num { color: #e53935; }
  .click-pill.warm .num { color: #fb8c00; }
  .click-pill.cold .num { color: #1e88e5; }
  .click-pill.nq .num { color: #9e9e9e; }
  .click-pill.virtual .num { color: #8e24aa; }
  .click-pill.inperson .num { color: #43a047; }
  .click-pill .qlabel { font-size: 11px; color: #888; margin-top: 4px; }
  .click-pill .click-hint { font-size: 10px; color: #aaa; margin-top: 3px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    background: #e8f0fe; color: #1565c0; padding: 10px 12px;
    text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase;
    border-bottom: 2px solid #90caf9; position: sticky; top: 0; z-index: 1;
  }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid #f0f4ff; color: #333; }
  .data-table tr:hover td { background: #f0f7ff; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.hot { background: #ffebee; color: #e53935; border: 1px solid #ef9a9a; }
  .badge.warm { background: #fff3e0; color: #fb8c00; border: 1px solid #ffcc80; }
  .badge.cold { background: #e3f2fd; color: #1e88e5; border: 1px solid #90caf9; }
  .badge.nq { background: #f5f5f5; color: #9e9e9e; border: 1px solid #e0e0e0; }
  .badge.done { background: #e8f5e9; color: #43a047; border: 1px solid #a5d6a7; }
  .badge.progress { background: #fff8e1; color: #f9a825; border: 1px solid #ffe082; }
  .badge.virtual { background: #f3e5f5; color: #8e24aa; border: 1px solid #ce93d8; }
  .badge.inperson { background: #e8f5e9; color: #43a047; border: 1px solid #a5d6a7; }

  .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 130px; padding: 0 10px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.8s ease; min-height: 4px; }
  .bar-month { font-size: 11px; color: #888; }
  .bar-val { font-size: 10px; color: #1976d2; font-weight: 600; }

  .program-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
  .program-card {
    background: #fff; border: 1px solid #e0e7ef; border-radius: 10px;
    padding: 16px; transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .program-card:hover { border-color: #1976d2; box-shadow: 0 4px 14px rgba(21,101,192,0.1); }
  .program-card .prog-name { font-size: 13px; font-weight: 700; color: #1565c0; margin-bottom: 4px; }
  .program-card .prog-team { font-size: 11px; color: #888; margin-bottom: 8px; }
  .program-card .prog-metric { font-size: 11px; color: #888; margin-top: 4px; }
  .program-card .prog-value { font-size: 28px; font-weight: 700; color: #43a047; }

  .loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid #e0e7ef; border-top-color: #1976d2;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 10px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fff5f5; border: 1px solid #ef9a9a;
    border-radius: 8px; padding: 24px; color: #c62828; line-height: 1.7;
  }

  .table-controls {
    display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 200px; padding: 8px 14px;
    border: 1px solid #90caf9; border-radius: 6px;
    font-size: 13px; color: #1a1a2e; background: #f0f7ff;
  }
  .search-box:focus { outline: none; border-color: #1976d2; }
  .result-count { font-size: 12px; color: #888; font-style: italic; }
  .clear-filter-btn {
    background: #fff; border: 1px solid #ef5350; color: #e53935;
    padding: 7px 14px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer;
  }
  .clear-filter-btn:hover { background: #ffebee; }
  .table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; border-radius: 8px; border: 1px solid #e0e7ef; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 T-Hub Performance Dashboard</h1>
  <p>Lead Gen Specialist · CI + Delivery · Email Channel · Oct 2025 – Mar 2026</p>
  <div class="last-updated" id="lastUpdated">Loading live data...</div>
</div>

<div class="filters">
  <label>📅 Month</label>
  <select id="filterMonth" onchange="applyFilters()">
    <option value="All">All Months</option>
    <option value="Oct-25">Oct 2025</option>
    <option value="Nov-25">Nov 2025</option>
    <option value="Dec-25">Dec 2025</option>
    <option value="Jan-26">Jan 2026</option>
    <option value="Feb-26">Feb 2026</option>
    <option value="Mar-26">Mar 2026</option>
  </select>
  <label>👥 Team</label>
  <select id="filterTeam" onchange="applyFilters()">
    <option value="All">All Teams</option>
    <option value="CI">CI</option>
    <option value="Delivery">Delivery</option>
  </select>
  <label>📁 Program</label>
  <select id="filterProgram" onchange="applyFilters()">
    <option value="All">All Programs</option>
    <option value="CI Outreach">CI Outreach</option>
    <option value="XDC / Shealth.ai">XDC / Shealth.ai</option>
    <option value="Kotak Outreach">Kotak Outreach</option>
    <option value="Kotak Roadshow">Kotak Roadshow</option>
    <option value="Youth Co-Lab">Youth Co-Lab</option>
    <option value="Honda Outreach">Honda Outreach</option>
    <option value="Telangana Founders">Telangana Founders</option>
  </select>
  <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
</div>

<div class="container" id="mainContent">
  <div class="loading"><span class="spinner"></span>Connecting to Google Sheets...</div>
</div>

<script>
// ✅ YOUR NEW APPS SCRIPT URL WITH JSONP SUPPORT
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAtk-HpNjX8BehmGw63tUrkyDzHVJfloEzQicVkPEOMIOzCZNgvVDWhFN114Bqk5Os/exec";

let allData = {};
let activeQuickFilter = null;

// ✅ JSONP — bypasses CORS completely, no proxy needed
function fetchWithJsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = "jsonpCb_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
    const script = document.createElement("script");

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout: Apps Script took too long. Make sure it's deployed as 'Anyone'."));
    }, 12000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) document.head.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.src = url + "?callback=" + cbName + "&t=" + Date.now();
    script.onerror = function() {
      cleanup();
      reject(new Error("Script load failed. Check your Apps Script URL and deployment settings."));
    };
    document.head.appendChild(script);
  });
}

async function loadData() {
  document.getElementById("mainContent").innerHTML =
    '<div class="loading"><span class="spinner"></span>Fetching live data from Google Sheets...</div>';
  try {
    allData = await fetchWithJsonp(WEB_APP_URL);
    document.getElementById("lastUpdated").textContent =
      "✅ Live data loaded · " + new Date().toLocaleString();
    activeQuickFilter = null;
    applyFilters();
  } catch(err) {
    document.getElementById("mainContent").innerHTML = `
      <div class="error-box">
        <strong>❌ Could not load data</strong><br><br>
        <b>Error:</b> ${err.message}<br><br>
        <b>Fix checklist:</b><br>
        1. Go to Apps Script → Deploy → Manage Deployments<br>
        2. Edit your deployment → set <b>"Who has access" = Anyone</b><br>
        3. Click <b>New Version</b> → Deploy<br>
        4. Make sure your Apps Script has the <b>JSONP callback support</b> code<br>
        5. Come back and click 🔄 Refresh
      </div>`;
  }
}

function applyFilters() {
  const month = document.getElementById("filterMonth").value;
  const team = document.getElementById("filterTeam").value;
  const program = document.getElementById("filterProgram").value;
  renderDashboard(month, team, program);
}

function setQuickFilter(type) {
  activeQuickFilter = (activeQuickFilter === type) ? null : type;
  applyFilters();
}

function clearQuickFilter() {
  activeQuickFilter = null;
  applyFilters();
}

function getVal(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== "") return String(row[k]).trim();
  }
  return "";
}

function filterRows(sheetName, month, team, program) {
  const rows = allData[sheetName] || [];
  return rows.filter(r => {
    const m = getVal(r, "Month", "month");
    const t = getVal(r, "Team", "team");
    const p = getVal(r, "Program", "program");
    return (month === "All" || m === month) &&
           (team === "All" || t === team) &&
           (program === "All" || p === program);
  });
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

function funnelRow(label, value, total, color) {
  const pct = total > 0 ? Math.max((value / total) * 100, 2) : 2;
  return `<div class="funnel-row">
    <div class="funnel-label">${label}</div>
    <div class="funnel-bar-wrap">
      <div class="funnel-bar" style="width:${pct}%;background:${color};">${value > 0 ? value.toLocaleString() : ''}</div>
    </div>
    <div class="funnel-value">${value.toLocaleString()}</div>
  </div>`;
}

function qualBadge(q) {
  const l = (q || "").toLowerCase();
  if (l === "hot") return `<span class="badge hot">🔥 Hot</span>`;
  if (l === "warm") return `<span class="badge warm">🟠 Warm</span>`;
  if (l === "cold") return `<span class="badge cold">🔵 Cold</span>`;
  if (l) return `<span class="badge nq">⚪ ${q}</span>`;
  return `<span style="color:#ccc;">—</span>`;
}

function statusBadge(s) {
  const l = (s || "").toLowerCase();
  if (l === "done" || l === "completed") return `<span class="badge done">✅ Done</span>`;
  if (l) return `<span class="badge progress">⏳ ${s}</span>`;
  return `<span style="color:#ccc;">—</span>`;
}

function typeBadge(t) {
  const l = (t || "").toLowerCase();
  if (l === "virtual") return `<span class="badge virtual">💻 Virtual</span>`;
  if (l === "in-person" || l === "inperson") return `<span class="badge inperson">🏢 In-Person</span>`;
  if (l) return `<span class="badge nq">${t}</span>`;
  return `<span style="color:#ccc;">—</span>`;
}

function renderTableRows(rows) {
  if (!rows.length) {
    return `<tr><td colspan="11" style="text-align:center;color:#bbb;padding:40px;font-style:italic;">
      No meetings found for the selected filters</td></tr>`;
  }
  return rows.map((r, i) => `<tr>
    <td style="color:#bbb;font-size:11px;">${i + 1}</td>
    <td>${getVal(r,"Date","date") || "—"}</td>
    <td>${getVal(r,"Month","month") || "—"}</td>
    <td>${getVal(r,"Program","program") || "—"}</td>
    <td style="font-weight:600;color:#1565c0;">${getVal(r,"Company","Startup","startup","company","Name","name") || "—"}</td>
    <td>${getVal(r,"Contact","Contact Person","contact","Person","person") || "—"}</td>
    <td>${typeBadge(getVal(r,"Meeting_Type","Meeting Type","meeting_type","Type","type"))}</td>
    <td>${statusBadge(getVal(r,"Status","status"))}</td>
    <td>${qualBadge(getVal(r,"Qualification","qualification"))}</td>
    <td style="font-size:12px;">${getVal(r,"Next_Action","Next Action","next_action","NextAction") || "—"}</td>
    <td style="font-size:11px;color:#777;max-width:160px;white-space:normal;">${getVal(r,"Notes","notes","Remarks","remarks") || "—"}</td>
  </tr>`).join("");
}

function renderDashboard(month, team, program) {
  const sheetNames = Object.keys(allData);
  if (!sheetNames.length) {
    document.getElementById("mainContent").innerHTML =
      `<div class="error-box">⚠️ No sheets found in response. Check your Apps Script code.</div>`;
    return;
  }

  const meetSheet = sheetNames.find(s => s.toLowerCase().includes("meet")) || sheetNames[0];
  const emailSheet = sheetNames.find(s =>
    s.toLowerCase().includes("email") || s.toLowerCase().includes("master") || s.toLowerCase().includes("perf")
  ) || sheetNames[1] || sheetNames[0];

  const emailRows = filterRows(emailSheet, month, team, program);
  const meetRows  = filterRows(meetSheet, month, team, program);

  // Email metrics
  const totalSent      = emailRows.reduce((s,r) => s + num(getVal(r,"Sent","sent")), 0);
  const totalDelivered = emailRows.reduce((s,r) => s + num(getVal(r,"Delivered","delivered")), 0);
  const totalOpens     = emailRows.reduce((s,r) => s + num(getVal(r,"Unique Opens","Opens","opens")), 0);
  const totalClicks    = emailRows.reduce((s,r) => s + num(getVal(r,"Unique Clicks","Clicks","clicks")), 0);
  const totalReplies   = emailRows.reduce((s,r) => s + num(getVal(r,"Unique Replies","Replies","replies")), 0);
  const totalBounces   = emailRows.reduce((s,r) => s + num(getVal(r,"Bounces","bounces")), 0);
  const openRate  = totalSent > 0 ? ((totalOpens/totalSent)*100).toFixed(1) : "0.0";
  const clickRate = totalSent > 0 ? ((totalClicks/totalSent)*100).toFixed(1) : "0.0";
  const replyRate = totalSent > 0 ? ((totalReplies/totalSent)*100).toFixed(1) : "0.0";

  // Meetings metrics
  const hot     = meetRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "hot").length;
  const warm    = meetRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "warm").length;
  const cold    = meetRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "cold").length;
  const nq      = meetRows.filter(r => {
    const q = getVal(r,"Qualification","qualification").toLowerCase();
    return q === "not qualified" || q === "nq";
  }).length;
  const virtual  = meetRows.filter(r => getVal(r,"Meeting_Type","Meeting Type","meeting_type").toLowerCase() === "virtual").length;
  const inperson = meetRows.filter(r => {
    const t = getVal(r,"Meeting_Type","Meeting Type","meeting_type").toLowerCase();
    return t === "in-person" || t === "inperson" || t === "in person";
  }).length;
  const proposals = meetRows.filter(r => getVal(r,"Next_Action","Next Action","next_action").toLowerCase().includes("proposal")).length;
  const followups  = meetRows.filter(r => getVal(r,"Next_Action","Next Action","next_action").toLowerCase().includes("follow")).length;

  // Table: apply quick filter
  let tableRows = [...meetRows];
  if (activeQuickFilter === "hot")      tableRows = tableRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "hot");
  else if (activeQuickFilter === "warm") tableRows = tableRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "warm");
  else if (activeQuickFilter === "cold") tableRows = tableRows.filter(r => getVal(r,"Qualification","qualification").toLowerCase() === "cold");
  else if (activeQuickFilter === "nq")   tableRows = tableRows.filter(r => {
    const q = getVal(r,"Qualification","qualification").toLowerCase();
    return q === "not qualified" || q === "nq";
  });
  else if (activeQuickFilter === "virtual")  tableRows = tableRows.filter(r => getVal(r,"Meeting_Type","Meeting Type","meeting_type").toLowerCase() === "virtual");
  else if (activeQuickFilter === "inperson") tableRows = tableRows.filter(r => {
    const t = getVal(r,"Meeting_Type","Meeting Type","meeting_type").toLowerCase();
    return t === "in-person" || t === "inperson" || t === "in person";
  });

  // Monthly trend
  const months = ["Oct-25","Nov-25","Dec-25","Jan-26","Feb-26","Mar-26"];
  const allEmail = allData[emailSheet] || [];
  const monthlyData = months.map(m => ({
    month: m,
    sent: allEmail.filter(r => getVal(r,"Month","month") === m && (team === "All" || getVal(r,"Team","team") === team))
                  .reduce((s,r) => s + num(getVal(r,"Sent","sent")), 0)
  }));
  const maxSent = Math.max(...monthlyData.map(d => d.sent), 1);

  const filterLabels = { hot:"🔥 Hot Leads", warm:"🟠 Warm Leads", cold:"🔵 Cold Leads",
    nq:"⚪ Not Qualified", virtual:"💻 Virtual Meetings", inperson:"🏢 In-Person Meetings" };

  document.getElementById("mainContent").innerHTML = `

    ${activeQuickFilter ? `
    <div class="active-filter-bar">
      <span style="font-size:13px;color:#555;font-weight:600;">Filtering table by:</span>
      <div class="filter-chip">${filterLabels[activeQuickFilter]}
        <span class="remove" onclick="clearQuickFilter()">✕</span>
      </div>
      <span class="result-count">${tableRows.length} record${tableRows.length !== 1 ? "s" : ""} shown</span>
    </div>` : ""}

    <!-- KPI CARDS -->
    <div class="kpi-grid">
      <div class="kpi-card"><div class="value">${totalSent.toLocaleString()}</div><div class="label">📤 Emails Sent</div></div>
      <div class="kpi-card"><div class="value">${openRate}%</div><div class="label">👁️ Open Rate</div></div>
      <div class="kpi-card"><div class="value">${clickRate}%</div><div class="label">🖱️ Click Rate</div></div>
      <div class="kpi-card"><div class="value">${replyRate}%</div><div class="label">💬 Reply Rate</div></div>
      <div class="kpi-card"><div class="value">${meetRows.length}</div><div class="label">🤝 Total Meetings</div></div>
      <div class="kpi-card"><div class="value">${hot}</div><div class="label">🔥 Hot Leads</div><div class="sublabel">Ready to Close</div></div>
      <div class="kpi-card"><div class="value">${proposals}</div><div class="label">📄 Proposals</div></div>
      <div class="kpi-card"><div class="value">${totalBounces.toLocaleString()}</div><div class="label">⛔ Bounces</div></div>
    </div>

    <!-- FUNNEL + QUALIFICATION -->
    <div class="two-col">
      <div class="card">
        <div class="section-title">📧 Email Funnel</div>
        ${funnelRow("Sent", totalSent, totalSent, "#1976d2")}
        ${funnelRow("Delivered", totalDelivered, totalSent, "#43a047")}
        ${funnelRow("Opens", totalOpens, totalSent, "#00acc1")}
        ${funnelRow("Clicks", totalClicks, totalSent, "#fb8c00")}
        ${funnelRow("Replies", totalReplies, totalSent, "#8e24aa")}
      </div>
      <div class="card">
        <div class="section-title">🎯 Lead Qualification
          <span style="font-size:10px;color:#aaa;font-weight:400;">Click to filter ↓</span>
        </div>
        <div class="clickable-grid">
          <div class="click-pill hot ${activeQuickFilter==="hot"?"active-pill":""}" onclick="setQuickFilter('hot')">
            <div class="num">${hot}</div><div class="qlabel">🔥 Hot</div><div class="click-hint">tap to filter</div>
          </div>
          <div class="click-pill warm ${activeQuickFilter==="warm"?"active-pill":""}" onclick="setQuickFilter('warm')">
            <div class="num">${warm}</div><div class="qlabel">🟠 Warm</div><div class="click-hint">tap to filter</div>
          </div>
          <div class="click-pill cold ${activeQuickFilter==="cold"?"active-pill":""}" onclick="setQuickFilter('cold')">
            <div class="num">${cold}</div><div class="qlabel">🔵 Cold</div><div class="click-hint">tap to filter</div>
          </div>
          <div class="click-pill nq ${activeQuickFilter==="nq"?"active-pill":""}" onclick="setQuickFilter('nq')">
            <div class="num">${nq}</div><div class="qlabel">⚪ Not Qualified</div><div class="click-hint">tap to filter</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MEETING TYPE + NEXT ACTIONS -->
    <div class="two-col">
      <div class="card">
        <div class="section-title">💻 Meeting Type
          <span style="font-size:10px;color:#aaa;font-weight:400;">Click to filter ↓</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="click-pill virtual ${activeQuickFilter==="virtual"?"active-pill":""}" onclick="setQuickFilter('virtual')">
            <div class="num">${virtual}</div><div class="qlabel">💻 Virtual</div><div class="click-hint">tap to filter</div>
          </div>
          <div class="click-pill inperson ${activeQuickFilter==="inperson"?"active-pill":""}" onclick="setQuickFilter('inperson')">
            <div class="num">${inperson}</div><div class="qlabel">🏢 In-Person</div><div class="click-hint">tap to filter</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">⚡ Next Actions Pipeline</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;">
          <div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:16px 28px;text-align:center;">
            <div style="font-size:28px;font-weight:700;color:#43a047;">${proposals}</div>
            <div style="font-size:11px;color:#888;margin-top:4px;">📄 Proposals</div>
          </div>
          <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:16px 28px;text-align:center;">
            <div style="font-size:28px;font-weight:700;color:#f9a825;">${followups}</div>
            <div style="font-size:11px;color:#888;margin-top:4px;">🔄 Follow-ups</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MONTHLY TREND -->
    <div class="card" style="margin-bottom:28px;">
      <div class="section-title">📈 Monthly Email Volume</div>
      <div class="bar-chart">
        ${monthlyData.map(d => `
          <div class="bar-col">
            <div class="bar-val">${d.sent > 0 ? d.sent.toLocaleString() : "—"}</div>
            <div class="bar" style="height:${d.sent > 0 ? Math.max((d.sent/maxSent)*100,6) : 4}px;
              background:linear-gradient(180deg,#1976d2,#42a5f5);"></div>
            <div class="bar-month">${d.month.replace("-25","").replace("-26","")}</div>
          </div>`).join("")}
      </div>
    </div>

    <!-- ALL MEETINGS TABLE -->
    <div class="card">
      <div class="section-title">
        📋 All Meetings & Prospects
        <span style="font-size:11px;color:#999;font-weight:400;margin-left:4px;">
          ${activeQuickFilter ? tableRows.length + " filtered" : meetRows.length + " total"} records
        </span>
      </div>
      <div class="table-controls">
        <input class="search-box" id="searchBox" placeholder="🔍 Search company, name, program, notes..." oninput="liveSearch()" />
        ${activeQuickFilter ? `<button class="clear-filter-btn" onclick="clearQuickFilter()">✕ Clear Filter</button>` : ""}
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Date</th><th>Month</th><th>Program</th>
              <th>Company / Startup</th><th>Contact</th><th>Type</th>
              <th>Status</th><th>Qualification</th><th>Next Action</th><th>Notes</th>
            </tr>
          </thead>
          <tbody id="meetingsBody">${renderTableRows(tableRows)}</tbody>
        </table>
      </div>
    </div>
  `;
}

function liveSearch() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  const rows = document.querySelectorAll("#meetingsBody tr");
  let count = 0;
  rows.forEach(row => {
    const show = row.textContent.toLowerCase().includes(q);
    row.style.display = show ? "" : "none";
    if (show) count++;
  });
  const rc = document.getElementById("resultCount");
  if (rc) rc.textContent = q ? count + " result" + (count !== 1 ? "s" : "") : "";
}

loadData();
</script>
</body>
</html>
