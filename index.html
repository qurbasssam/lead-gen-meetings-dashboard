<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Hub Performance Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f0f4ff; color:#1a1a2e; }

.header {
  background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
  padding:24px 36px; text-align:center;
}
.header h1 { font-size:24px; color:#fff; font-weight:700; }
.header p  { color:#bbdefb; font-size:12px; margin-top:4px; }
#lastUpdated { color:#fff; font-size:11px; margin-top:6px; opacity:0.85; }

/* ── FILTER BAR ── */
.filter-bar {
  background:#fff; border-bottom:2px solid #e3eaff;
  padding:14px 36px; display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;
}
.filter-group { display:flex; flex-direction:column; gap:4px; }
.filter-group label { font-size:11px; font-weight:700; color:#5c6bc0; text-transform:uppercase; }
.filter-group select {
  padding:7px 12px; border:1.5px solid #90caf9; border-radius:7px;
  font-size:13px; background:#f5f8ff; color:#1a1a2e; cursor:pointer; min-width:140px;
}
.filter-group select:focus { outline:none; border-color:#1976d2; }
.btn-refresh {
  margin-left:auto; background:#1976d2; color:#fff; border:none;
  padding:9px 22px; border-radius:7px; font-size:13px; font-weight:600;
  cursor:pointer; align-self:flex-end;
}
.btn-refresh:hover { background:#0d47a1; }
.btn-reset {
  background:#fff; color:#e53935; border:1.5px solid #ef9a9a;
  padding:9px 16px; border-radius:7px; font-size:13px; font-weight:600;
  cursor:pointer; align-self:flex-end;
}

/* ── ACTIVE FILTER CHIPS ── */
.chip-bar { padding:10px 36px; display:flex; flex-wrap:wrap; gap:8px; background:#f0f4ff; }
.chip {
  background:#e3f2fd; border:1px solid #90caf9; color:#1565c0;
  padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600;
  display:flex; align-items:center; gap:5px;
}
.chip .x { color:#e53935; cursor:pointer; font-weight:800; }

/* ── CONTAINER ── */
.wrap { padding:22px 36px; }

/* ── KPI CARDS ── */
.kpi-row {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px; margin-bottom:22px;
}
.kpi {
  background:#fff; border-radius:12px; padding:16px; text-align:center;
  border:1px solid #e3eaff; box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:transform .2s;
}
.kpi:hover { transform:translateY(-3px); }
.kpi .val  { font-size:28px; font-weight:800; color:#1976d2; }
.kpi .lbl  { font-size:10px; color:#90a4ae; text-transform:uppercase; margin-top:4px; }
.kpi .sub  { font-size:10px; color:#66bb6a; margin-top:2px; }

/* ── SECTION TITLE ── */
.sec { font-size:14px; font-weight:700; color:#0d47a1; margin-bottom:12px;
       padding-bottom:6px; border-bottom:2px solid #90caf9; }

/* ── CARD ── */
.card {
  background:#fff; border-radius:12px; padding:20px;
  border:1px solid #e3eaff; box-shadow:0 2px 8px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* ── TWO COL ── */
.two { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:20px; }
@media(max-width:850px){ .two { grid-template-columns:1fr; } }

/* ── FUNNEL BARS ── */
.frow { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.flbl { width:110px; font-size:12px; color:#546e7a; }
.fwrap { flex:1; background:#eef2ff; border-radius:4px; height:24px; overflow:hidden; }
.fbar {
  height:100%; border-radius:4px; display:flex; align-items:center;
  padding-left:8px; font-size:11px; font-weight:700; color:#fff;
  transition:width .8s;
}
.fval { width:50px; text-align:right; font-weight:700; color:#1976d2; font-size:13px; }

/* ── PILLS (clickable) ── */
.pill-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pill {
  border-radius:10px; padding:14px; text-align:center;
  border:2px solid transparent; cursor:pointer;
  transition:transform .15s, box-shadow .15s;
}
.pill:hover { transform:scale(1.04); box-shadow:0 4px 14px rgba(0,0,0,0.1); }
.pill.active { box-shadow:0 0 0 3px rgba(21,101,192,.3); transform:scale(1.04); }
.pill .pnum  { font-size:24px; font-weight:800; }
.pill .plbl  { font-size:11px; color:#888; margin-top:3px; }
.pill .phint { font-size:10px; color:#bbb; margin-top:2px; }
.pill.hot  { background:#fff5f5; border-color:#ef5350; }
.pill.warm { background:#fff8f0; border-color:#ffa726; }
.pill.cold { background:#f0f7ff; border-color:#42a5f5; }
.pill.nq   { background:#fafafa; border-color:#bdbdbd; }
.pill.virt { background:#f3e5f5; border-color:#ab47bc; }
.pill.inp  { background:#e8f5e9; border-color:#66bb6a; }
.pill.hot  .pnum { color:#e53935; }
.pill.warm .pnum { color:#fb8c00; }
.pill.cold .pnum { color:#1e88e5; }
.pill.nq   .pnum { color:#9e9e9e; }
.pill.virt .pnum { color:#8e24aa; }
.pill.inp  .pnum { color:#43a047; }

/* ── BADGES ── */
.b { display:inline-block; padding:3px 9px; border-radius:20px;
     font-size:11px; font-weight:600; }
.b.hot  { background:#ffebee; color:#e53935; border:1px solid #ef9a9a; }
.b.warm { background:#fff3e0; color:#fb8c00; border:1px solid #ffcc80; }
.b.cold { background:#e3f2fd; color:#1e88e5; border:1px solid #90caf9; }
.b.nq   { background:#f5f5f5; color:#9e9e9e; border:1px solid #e0e0e0; }
.b.virt { background:#f3e5f5; color:#8e24aa; border:1px solid #ce93d8; }
.b.inp  { background:#e8f5e9; color:#43a047; border:1px solid #a5d6a7; }
.b.prop { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
.b.nval { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; }
.b.pend { background:#fff8e1; color:#f57f17; border:1px solid #ffe082; }

/* ── TABLE ── */
.twrap { overflow-x:auto; max-height:500px; overflow-y:auto;
         border-radius:8px; border:1px solid #e3eaff; }
table  { width:100%; border-collapse:collapse; font-size:12px; }
thead th {
  background:#e8f0fe; color:#1565c0; padding:9px 11px;
  text-align:left; font-size:10px; text-transform:uppercase; font-weight:700;
  border-bottom:2px solid #90caf9; position:sticky; top:0; z-index:1;
}
tbody td { padding:9px 11px; border-bottom:1px solid #f0f4ff; }
tbody tr:hover td { background:#f5f8ff; }

/* ── SEARCH ── */
.srch {
  width:100%; padding:8px 14px; border:1.5px solid #90caf9;
  border-radius:7px; font-size:13px; background:#f5f8ff; margin-bottom:12px;
}
.srch:focus { outline:none; border-color:#1976d2; }

/* ── BAR CHART ── */
.bchart { display:flex; align-items:flex-end; gap:8px; height:120px; padding:0 8px; }
.bcol   { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bbar   { width:100%; border-radius:4px 4px 0 0; transition:height .8s; min-height:3px; }
.bmlbl  { font-size:10px; color:#90a4ae; }
.bvlbl  { font-size:10px; color:#1976d2; font-weight:600; }

/* ── NEXT ACTIONS ── */
.na-grid { display:flex; gap:12px; flex-wrap:wrap; }
.na-box {
  border-radius:10px; padding:14px 22px; text-align:center; flex:1; min-width:100px;
}
.na-box .nv  { font-size:26px; font-weight:800; }
.na-box .nl  { font-size:11px; color:#888; margin-top:3px; }

/* ── LOADING / ERROR ── */
.loading { text-align:center; padding:60px; color:#90a4ae; font-size:15px; }
.spin {
  display:inline-block; width:26px; height:26px;
  border:3px solid #e3eaff; border-top-color:#1976d2;
  border-radius:50%; animation:sp .8s linear infinite;
  margin-right:8px; vertical-align:middle;
}
@keyframes sp { to { transform:rotate(360deg); } }
.err { background:#fff5f5; border:1px solid #ef9a9a; border-radius:8px;
       padding:22px; color:#c62828; line-height:1.9; }
.dbg { background:#f0f7ff; border:1px solid #90caf9; border-radius:8px;
       padding:12px 16px; margin-bottom:16px; font-size:11px;
       color:#1565c0; font-family:monospace; line-height:1.7; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 T-Hub Performance Dashboard</h1>
  <p>Lead Gen Specialist · CI + Delivery · Email Channel · Oct 2025 – Mar 2026</p>
  <div id="lastUpdated">Connecting to Google Sheets…</div>
</div>

<!-- FILTERS -->
<div class="filter-bar">
  <div class="filter-group">
    <label>📅 Month</label>
    <select id="fMonth" onchange="applyAll()">
      <option value="">All Months</option>
      <option>Oct-25</option><option>Nov-25</option><option>Dec-25</option>
      <option>Jan-26</option><option>Feb-26</option><option>Mar-26</option>
    </select>
  </div>
  <div class="filter-group">
    <label>👥 Team</label>
    <select id="fTeam" onchange="applyAll()">
      <option value="">All Teams</option>
      <option>CI</option>
      <option>Delivery</option>
    </select>
  </div>
  <div class="filter-group">
    <label>📁 Program</label>
    <select id="fProgram" onchange="applyAll()">
      <option value="">All Programs</option>
      <option>CI</option>
      <option>XDC</option>
      <option>Kotak</option>
      <option>KotakRoadshow</option>
      <option>YouthCoLab</option>
      <option>Honda</option>
      <option>Funding</option>
    </select>
  </div>
  <div class="filter-group">
    <label>🎯 Qualification</label>
    <select id="fQual" onchange="applyAll()">
      <option value="">All</option>
      <option>Hot</option>
      <option>Warm</option>
      <option>Cold</option>
      <option>NQ</option>
    </select>
  </div>
  <div class="filter-group">
    <label>💻 Meeting Type</label>
    <select id="fMode" onchange="applyAll()">
      <option value="">All Types</option>
      <option>Virtual</option>
      <option>In-Person</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetFilters()">✕ Reset</button>
  <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
</div>

<!-- ACTIVE CHIPS -->
<div class="chip-bar" id="chipBar"></div>

<!-- MAIN -->
<div class="wrap" id="main">
  <div class="loading"><span class="spin"></span>Loading from Google Sheets…</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbym4e6zeHvtHJYrdxsMQHxovdxd7HwlBSbViD9Tub5un4TwirRD6jPab78WseWuk5YO/exec";

let RAW = {};          // raw data from Apps Script
let sheetM = "";       // Meetings_Data key
let sheetE = "";       // Email_Stats key

// ── FETCH JSONP ────────────────────────────────────────────────
function fetchJsonp(url){
  return new Promise((res,rej)=>{
    const cb="cb_"+Date.now();
    const s=document.createElement("script");
    const t=setTimeout(()=>{ cleanup(); rej(new Error("Timeout — check Apps Script URL & permissions")); },15000);
    function cleanup(){ clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); }
    window[cb]=d=>{ cleanup(); res(d); };
    s.onerror=()=>{ cleanup(); rej(new Error("Script failed to load — check Apps Script deployment")); };
    s.src=url+"?callback="+cb+"&t="+Date.now();
    document.head.appendChild(s);
  });
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData(){
  document.getElementById("main").innerHTML='<div class="loading"><span class="spin"></span>Loading live data…</div>';
  try{
    RAW = await fetchJsonp(GAS_URL);
    const keys = Object.keys(RAW);
    sheetM = keys.find(k=>/meetings/i.test(k)) || keys[0] || "";
    sheetE = keys.find(k=>/email/i.test(k))    || keys[1] || keys[0] || "";
    document.getElementById("lastUpdated").textContent =
      "✅ Live | 📋 "+sheetM+" ("+((RAW[sheetM]||[]).length)+" rows) | 📧 "+sheetE+" ("+((RAW[sheetE]||[]).length)+" rows) | "+new Date().toLocaleString();
    applyAll();
  }catch(e){
    document.getElementById("main").innerHTML=`<div class="err">
      <strong>❌ Connection Failed</strong><br><br>
      <b>Reason:</b> ${e.message}<br><br>
      <b>Fix:</b><br>
      1. Apps Script → Deploy → Manage Deployments<br>
      2. Edit → Who has access = <b>Anyone</b><br>
      3. Create New Version → Deploy<br>
      4. Click 🔄 Refresh
    </div>`;
  }
}

// ── FLEXIBLE COLUMN GETTER ────────────────────────────────────
function g(row,...keys){
  for(const k of keys){
    if(row[k]!==undefined && String(row[k]).trim()!=="") return String(row[k]).trim();
    const rk=Object.keys(row).find(x=>x.toLowerCase().replace(/[\s_]/g,"")=== k.toLowerCase().replace(/[\s_]/g,""));
    if(rk && String(row[rk]).trim()!=="") return String(row[rk]).trim();
  }
  return "";
}
function n(v){ const x=parseFloat(String(v).replace(/[,%]/g,"")); return isNaN(x)?0:x; }

// ── KEY ACCESSORS — mapped to YOUR actual column names ────────
const mQual   = r => g(r,"Meeting Stage");          // Hot/Warm/Cold
const mMode   = r => g(r,"Mode");                   // Virtual/In-Person
const mNext   = r => g(r,"Qullification","Qualification"); // Proposal sent / Not Valid
const mStatus = r => g(r,"Current Status");         // Full status text
const mName   = r => g(r,"Name","Company","name");
const mTitle  = r => g(r,"Title","title");
const mCo     = r => g(r,"Company","company");
const mDate   = r => g(r,"Date of Meeting","Date","date");
const mMonth  = r => g(r,"Month","month");
const mProg   = r => g(r,"Program","program");
const mTeam   = r => g(r,"Team","team");
const mIndustry = r => g(r,"Industry","industry");

// ── FILTER ROWS ───────────────────────────────────────────────
function filterRows(sheetKey){
  const mo = document.getElementById("fMonth").value;
  const te = document.getElementById("fTeam").value;
  const pr = document.getElementById("fProgram").value;
  const qu = document.getElementById("fQual").value;
  const md = document.getElementById("fMode").value;

  return (RAW[sheetKey]||[]).filter(r=>{
    if(mo && mMonth(r)!==mo)  return false;
    if(te && mTeam(r)!==te)   return false;
    if(pr && mProg(r)!==pr)   return false;
    if(qu){
      const q=mQual(r).toLowerCase();
      if(qu==="Hot"  && q!=="hot")  return false;
      if(qu==="Warm" && q!=="warm") return false;
      if(qu==="Cold" && q!=="cold") return false;
      if(qu==="NQ"   && q!=="nq" && q!=="not qualified" && q!=="") return false;
    }
    if(md){
      const m=mMode(r).toLowerCase();
      if(md==="Virtual"   && !m.includes("virtual"))  return false;
      if(md==="In-Person" && !m.includes("person"))   return false;
    }
    return true;
  });
}

function filterEmail(sheetKey){
  const mo = document.getElementById("fMonth").value;
  const te = document.getElementById("fTeam").value;
  const pr = document.getElementById("fProgram").value;
  return (RAW[sheetKey]||[]).filter(r=>{
    if(mo && g(r,"Month","month")!==mo) return false;
    if(te && g(r,"Team","team")!==te)   return false;
    if(pr && g(r,"Program","program")!==pr) return false;
    return true;
  });
}

// ── RESET FILTERS ─────────────────────────────────────────────
function resetFilters(){
  ["fMonth","fTeam","fProgram","fQual","fMode"].forEach(id=>{
    document.getElementById(id).value="";
  });
  applyAll();
}

// ── CHIP BAR ──────────────────────────────────────────────────
function renderChips(){
  const labels={fMonth:"Month",fTeam:"Team",fProgram:"Program",fQual:"Qualification",fMode:"Meeting Type"};
  let html="";
  Object.entries(labels).forEach(([id,lbl])=>{
    const v=document.getElementById(id).value;
    if(v) html+=`<div class="chip">${lbl}: <b>${v}</b> <span class="x" onclick="clearFilter('${id}')">✕</span></div>`;
  });
  document.getElementById("chipBar").innerHTML=html;
}
function clearFilter(id){ document.getElementById(id).value=""; applyAll(); }

// ── BADGES ───────────────────────────────────────────────────
function qBadge(q){
  const l=(q||"").toLowerCase();
  if(l==="hot")  return `<span class="b hot">🔥 Hot</span>`;
  if(l==="warm") return `<span class="b warm">🟠 Warm</span>`;
  if(l==="cold") return `<span class="b cold">🔵 Cold</span>`;
  if(l==="nq"||l==="not qualified") return `<span class="b nq">⚪ NQ</span>`;
  if(l)          return `<span class="b nq">⚪ ${q}</span>`;
  return `<span style="color:#ccc">—</span>`;
}
function modeBadge(m){
  const l=(m||"").toLowerCase();
  if(l.includes("virtual")&&l.includes("person")) return `<span class="b pend">🔀 Both</span>`;
  if(l.includes("virtual")) return `<span class="b virt">💻 Virtual</span>`;
  if(l.includes("person"))  return `<span class="b inp">🏢 In-Person</span>`;
  if(m) return `<span class="b nq">${m}</span>`;
  return `<span style="color:#ccc">—</span>`;
}
function nextBadge(nx){
  const l=(nx||"").toLowerCase();
  if(l.includes("proposal")) return `<span class="b prop">📄 ${nx}</span>`;
  if(l.includes("not valid")||l.includes("invalid")) return `<span class="b nval">❌ ${nx}</span>`;
  if(l) return `<span class="b pend">⏳ ${nx}</span>`;
  return `<span style="color:#ccc">—</span>`;
}

// ── FUNNEL BAR ────────────────────────────────────────────────
function fbar(lbl,val,total,color){
  const pct=total>0?Math.max((val/total)*100,2):2;
  return `<div class="frow">
    <div class="flbl">${lbl}</div>
    <div class="fwrap"><div class="fbar" style="width:${pct}%;background:${color}">${val>0?val.toLocaleString():""}</div></div>
    <div class="fval">${val.toLocaleString()}</div>
  </div>`;
}

// ── FORMAT DATE ───────────────────────────────────────────────
function fmtDate(d){
  if(!d) return "—";
  const dt=new Date(d);
  if(isNaN(dt)) return String(d).substring(0,12);
  return dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"});
}

// ── MAIN RENDER ───────────────────────────────────────────────
function applyAll(){
  renderChips();

  const mRows = filterRows(sheetM);
  const eRows = filterEmail(sheetE);

  // ── EMAIL STATS ──
  const sent      = eRows.reduce((s,r)=>s+n(g(r,"Sent","sent")),0);
  const delivered = eRows.reduce((s,r)=>s+n(g(r,"Delivered","delivered")),0);
  const opens     = eRows.reduce((s,r)=>s+n(g(r,"Unique_Opens","Unique Opens","Opens","opens")),0);
  const clicks    = eRows.reduce((s,r)=>s+n(g(r,"Unique_Clicks","Unique Clicks","Clicks","clicks")),0);
  const replies   = eRows.reduce((s,r)=>s+n(g(r,"Unique_Replies","Unique Replies","Replies","replies")),0);
  const bounces   = eRows.reduce((s,r)=>s+n(g(r,"Bounces","bounces")),0);
  const openRate  = sent>0?((opens/sent)*100).toFixed(1):"0.0";
  const clickRate = sent>0?((clicks/sent)*100).toFixed(1):"0.0";
  const replyRate = sent>0?((replies/sent)*100).toFixed(1):"0.0";

  // ── MEETING COUNTS ──
  const total   = mRows.length;
  const hot     = mRows.filter(r=>mQual(r).toLowerCase()==="hot").length;
  const warm    = mRows.filter(r=>mQual(r).toLowerCase()==="warm").length;
  const cold    = mRows.filter(r=>mQual(r).toLowerCase()==="cold").length;
  const nq      = mRows.filter(r=>{ const q=mQual(r).toLowerCase(); return q==="nq"||q==="not qualified"||q===""; }).length;
  const virtual = mRows.filter(r=>mMode(r).toLowerCase().includes("virtual")).length;
  const inperson= mRows.filter(r=>mMode(r).toLowerCase().includes("person")).length;
  const proposal= mRows.filter(r=>mNext(r).toLowerCase().includes("proposal")).length;
  const notValid= mRows.filter(r=>mNext(r).toLowerCase().includes("not valid")||mNext(r).toLowerCase().includes("invalid")).length;
  const noNext  = mRows.filter(r=>!mNext(r)).length;

  // ── MONTHLY TREND (uses ALL email data, filtered only by team) ──
  const months=["Oct-25","Nov-25","Dec-25","Jan-26","Feb-26","Mar-26"];
  const te=document.getElementById("fTeam").value;
  const allE=RAW[sheetE]||[];
  const monthly=months.map(m=>({
    m, s: allE.filter(r=>g(r,"Month","month")===m&&(!te||g(r,"Team","team")===te))
              .reduce((acc,r)=>acc+n(g(r,"Sent","sent")),0)
  }));
  const maxS=Math.max(...monthly.map(d=>d.s),1);

  // ── TABLE HTML ──
  const tableRows = mRows.length===0
    ? `<tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;font-style:italic">No records match the selected filters</td></tr>`
    : mRows.map((r,i)=>`<tr>
        <td style="color:#bbb;font-size:10px">${i+1}</td>
        <td style="font-weight:600;color:#1565c0;max-width:160px">${mName(r)||"—"}</td>
        <td style="font-size:11px;color:#546e7a">${mTitle(r)||"—"}</td>
        <td style="font-size:11px">${mIndustry(r)||"—"}</td>
        <td>${fmtDate(mDate(r))}</td>
        <td>${mMonth(r)||"—"}</td>
        <td>${modeBadge(mMode(r))}</td>
        <td>${qBadge(mQual(r))}</td>
        <td>${nextBadge(mNext(r))}</td>
      </tr>`).join("");

  document.getElementById("main").innerHTML = `

    <div class="dbg">
      🗂 Sheets: <b>${Object.keys(RAW).join(" | ")}</b> &nbsp;|&nbsp;
      📋 Meetings: <b>${sheetM}</b> → <b>${mRows.length}</b> rows &nbsp;|&nbsp;
      📧 Email: <b>${sheetE}</b> → <b>${eRows.length}</b> rows
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-row">
      <div class="kpi"><div class="val">${sent.toLocaleString()}</div><div class="lbl">📤 Emails Sent</div></div>
      <div class="kpi"><div class="val">${openRate}%</div><div class="lbl">👁 Open Rate</div></div>
      <div class="kpi"><div class="val">${clickRate}%</div><div class="lbl">🖱 Click Rate</div></div>
      <div class="kpi"><div class="val">${replyRate}%</div><div class="lbl">💬 Reply Rate</div></div>
      <div class="kpi"><div class="val">${total}</div><div class="lbl">🤝 Meetings</div></div>
      <div class="kpi"><div class="val">${hot}</div><div class="lbl">🔥 Hot Leads</div><div class="sub">Ready to close</div></div>
      <div class="kpi"><div class="val">${proposal}</div><div class="lbl">📄 Proposals Sent</div></div>
      <div class="kpi"><div class="val">${bounces.toLocaleString()}</div><div class="lbl">⛔ Bounces</div></div>
    </div>

    <!-- EMAIL FUNNEL + QUALIFICATION -->
    <div class="two">
      <div class="card">
        <div class="sec">📧 Email Funnel (Channel: Email)</div>
        ${fbar("Sent",      sent,      sent, "#1976d2")}
        ${fbar("Delivered", delivered, sent, "#43a047")}
        ${fbar("Opens",     opens,     sent, "#00acc1")}
        ${fbar("Clicks",    clicks,    sent, "#fb8c00")}
        ${fbar("Replies",   replies,   sent, "#8e24aa")}
      </div>
      <div class="card">
        <div class="sec">🎯 Lead Qualification <span style="font-size:10px;color:#bbb;font-weight:400">(click to filter table ↓)</span></div>
        <div class="pill-grid">
          <div class="pill hot" onclick="setQualFilter('Hot')">
            <div class="pnum">${hot}</div><div class="plbl">🔥 Hot</div><div class="phint">tap to filter</div>
          </div>
          <div class="pill warm" onclick="setQualFilter('Warm')">
            <div class="pnum">${warm}</div><div class="plbl">🟠 Warm</div><div class="phint">tap to filter</div>
          </div>
          <div class="pill cold" onclick="setQualFilter('Cold')">
            <div class="pnum">${cold}</div><div class="plbl">🔵 Cold</div><div class="phint">tap to filter</div>
          </div>
          <div class="pill nq" onclick="setQualFilter('NQ')">
            <div class="pnum">${nq}</div><div class="plbl">⚪ Not Qualified</div><div class="phint">tap to filter</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MEETING TYPE + NEXT ACTIONS -->
    <div class="two">
      <div class="card">
        <div class="sec">💻 Meeting Type <span style="font-size:10px;color:#bbb;font-weight:400">(click to filter ↓)</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="pill virt" onclick="setModeFilter('Virtual')">
            <div class="pnum">${virtual}</div><div class="plbl">💻 Virtual</div><div class="phint">tap to filter</div>
          </div>
          <div class="pill inp" onclick="setModeFilter('In-Person')">
            <div class="pnum">${inperson}</div><div class="plbl">🏢 In-Person</div><div class="phint">tap to filter</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="sec">⚡ Next Actions Pipeline</div>
        <div class="na-grid">
          <div class="na-box" style="background:#e8f5e9;border:1px solid #a5d6a7">
            <div class="nv" style="color:#2e7d32">${proposal}</div>
            <div class="nl">📄 Proposal Sent</div>
          </div>
          <div class="na-box" style="background:#fce4ec;border:1px solid #ef9a9a">
            <div class="nv" style="color:#c62828">${notValid}</div>
            <div class="nl">❌ Not Valid</div>
          </div>
          <div class="na-box" style="background:#fff8e1;border:1px solid #ffe082">
            <div class="nv" style="color:#f57f17">${noNext}</div>
            <div class="nl">⏳ Pending</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MONTHLY TREND -->
    <div class="card">
      <div class="sec">📈 Monthly Email Volume Trend</div>
      <div class="bchart">
        ${monthly.map(d=>`
          <div class="bcol">
            <div class="bvlbl">${d.s>0?d.s.toLocaleString():"—"}</div>
            <div class="bbar" style="height:${d.s>0?Math.max((d.s/maxS)*110,5):3}px;background:linear-gradient(180deg,#1976d2,#64b5f6)"></div>
            <div class="bmlbl">${d.m.replace("-25","").replace("-26","")}</div>
          </div>`).join("")}
      </div>
    </div>

    <!-- MEETINGS TABLE -->
    <div class="card">
      <div class="sec">
        📋 All Meetings — CI &amp; Delivery
        <span style="font-size:11px;color:#999;font-weight:400;margin-left:8px">${mRows.length} record${mRows.length!==1?"s":""}</span>
      </div>
      <input class="srch" id="srch" placeholder="🔍 Search name, company, industry, status…" oninput="liveSearch()">
      <div class="twrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Title</th>
              <th>Industry</th>
              <th>Date</th>
              <th>Month</th>
              <th>Mode</th>
              <th>Qualification</th>
              <th>Next Action</th>
            </tr>
          </thead>
          <tbody id="tbody">${tableRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── PILL FILTER SHORTCUTS ─────────────────────────────────────
function setQualFilter(v){
  const el=document.getElementById("fQual");
  el.value = el.value===v ? "" : v;
  applyAll();
}
function setModeFilter(v){
  const el=document.getElementById("fMode");
  el.value = el.value===v ? "" : v;
  applyAll();
}

// ── LIVE SEARCH ───────────────────────────────────────────────
function liveSearch(){
  const q=document.getElementById("srch").value.toLowerCase();
  let c=0;
  document.querySelectorAll("#tbody tr").forEach(r=>{
    const show=r.textContent.toLowerCase().includes(q);
    r.style.display=show?"":"none";
    if(show) c++;
  });
}

loadData();
</script>
